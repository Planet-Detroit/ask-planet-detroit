name: Weekly Scraper Health Check

on:
  # Run every Monday at 9 AM EST (14:00 UTC)
  schedule:
    - cron: '0 14 * * 1'

  # Allow manual triggering
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scrapers/requirements.txt

      - name: Run health check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd scrapers
          python health_check.py | tee health_report.txt

      - name: Post to Slack
        if: secrets.SLACK_WEBHOOK_URL != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          cd scrapers
          python health_check.py --slack

      - name: Run DOM canary checks
        run: |
          cd scrapers
          python canary_check.py 2>&1 | tee canary_report.txt || true

      - name: Post canary results to Slack
        if: secrets.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          cd scrapers
          python -c "
          import asyncio
          from canary_check import run_all_checks, format_slack_message, post_to_slack
          results = asyncio.run(run_all_checks())
          failed = [r for r in results if r['status'] == 'failed']
          if failed:
              post_to_slack(format_slack_message(results))
          " || true

      - name: Create summary
        if: always()
        run: |
          echo "## Weekly Health Check" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat scrapers/health_report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## DOM Canary Checks" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat scrapers/canary_report.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No canary report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
