name: Daily Meeting Scraper

on:
  # Run every day at 6 AM EST (11:00 UTC)
  schedule:
    - cron: '0 11 * * *'

  # Allow manual triggering from GitHub UI
  workflow_dispatch:
    inputs:
      scraper:
        description: 'Which scraper to run (or "all")'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - mpsc
          - glwa
          - detroit
          - detroit_agenda
          - egle
          - washtenaw
          - oakland
          - macomb
          - wayne_county
          - federal_register
          - livonia
          - canton
          - dearborn_heights
          - west_bloomfield
          - macomb_twp
          - roseville
          - birmingham
          - oak_park
          - romulus
          - harrison_twp
          - ypsilanti
          - grosse_pointe
          - ann_arbor
          - dwsd
          - st_clair_county

jobs:
  # --- Browser scrapers (need Playwright) ---
  browser-scrapers:
    if: github.event.inputs.scraper == 'all' || github.event.inputs.scraper == '' || contains(fromJSON('["mpsc","glwa","detroit","detroit_agenda","wayne_county"]'), github.event.inputs.scraper)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scraper: [mpsc, glwa, detroit, detroit_agenda, wayne_county]

    steps:
      - name: Check if this scraper was requested
        id: check
        run: |
          REQUESTED="${{ github.event.inputs.scraper || 'all' }}"
          if [ "$REQUESTED" = "all" ] || [ "$REQUESTED" = "${{ matrix.scraper }}" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r scrapers/requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run ${{ matrix.scraper }} scraper
        if: steps.check.outputs.should_run == 'true'
        id: scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd scrapers
          python run_scrapers.py ${{ matrix.scraper }} 2>&1 | tee scrape_output.txt

          # Parse RESULT line for machine-readable output
          RESULT_LINE=$(grep "^RESULT:" scrape_output.txt | tail -1 || echo "")
          if [ -n "$RESULT_LINE" ]; then
            STATUS=$(echo "$RESULT_LINE" | python3 -c "import sys,json; d=json.loads(sys.stdin.read().split('RESULT:',1)[1]); print(d.get('status','unknown'))")
            COUNT=$(echo "$RESULT_LINE" | python3 -c "import sys,json; d=json.loads(sys.stdin.read().split('RESULT:',1)[1]); print(d.get('count',0))")
            echo "status=$STATUS" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          else
            echo "status=unknown" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Create summary
        if: always() && steps.check.outputs.should_run == 'true'
        run: |
          echo "## ${{ matrix.scraper }} Scraper Results" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.scrape.outputs.status || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Count:** ${{ steps.scrape.outputs.count || '0' }}" >> $GITHUB_STEP_SUMMARY

  # --- API scrapers (no Playwright needed) ---
  api-scrapers:
    if: github.event.inputs.scraper == 'all' || github.event.inputs.scraper == '' || contains(fromJSON('["egle","federal_register","washtenaw","oakland","macomb","livonia","canton","dearborn_heights","west_bloomfield","macomb_twp","roseville","birmingham","oak_park","romulus","harrison_twp","ypsilanti","grosse_pointe","st_clair_county","ann_arbor","dwsd"]'), github.event.inputs.scraper)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scraper: [egle, federal_register, washtenaw, oakland, macomb, livonia, canton, dearborn_heights, west_bloomfield, macomb_twp, roseville, birmingham, oak_park, romulus, harrison_twp, ypsilanti, grosse_pointe, st_clair_county, ann_arbor, dwsd]

    steps:
      - name: Check if this scraper was requested
        id: check
        run: |
          REQUESTED="${{ github.event.inputs.scraper || 'all' }}"
          if [ "$REQUESTED" = "all" ] || [ "$REQUESTED" = "${{ matrix.scraper }}" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r scrapers/requirements.txt

      - name: Run ${{ matrix.scraper }} scraper
        if: steps.check.outputs.should_run == 'true'
        id: scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd scrapers
          python run_scrapers.py ${{ matrix.scraper }} 2>&1 | tee scrape_output.txt

          RESULT_LINE=$(grep "^RESULT:" scrape_output.txt | tail -1 || echo "")
          if [ -n "$RESULT_LINE" ]; then
            STATUS=$(echo "$RESULT_LINE" | python3 -c "import sys,json; d=json.loads(sys.stdin.read().split('RESULT:',1)[1]); print(d.get('status','unknown'))")
            COUNT=$(echo "$RESULT_LINE" | python3 -c "import sys,json; d=json.loads(sys.stdin.read().split('RESULT:',1)[1]); print(d.get('count',0))")
            echo "status=$STATUS" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          else
            echo "status=unknown" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Create summary
        if: always() && steps.check.outputs.should_run == 'true'
        run: |
          echo "## ${{ matrix.scraper }} Scraper Results" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.scrape.outputs.status || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Count:** ${{ steps.scrape.outputs.count || '0' }}" >> $GITHUB_STEP_SUMMARY

  # --- Summarizer (runs after all scrapers) ---
  summarizer:
    needs: [browser-scrapers, api-scrapers]
    if: always() && (github.event.inputs.scraper == 'all' || github.event.inputs.scraper == '')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scrapers/requirements.txt

      - name: Summarize agendas
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd scrapers
          python -m agenda_summarizer

      - name: Cleanup expired records
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd scrapers
          python cleanup.py

  # --- Notify ---
  notify:
    needs: [browser-scrapers, api-scrapers, summarizer]
    if: always() && secrets.SLACK_WEBHOOK_URL != ''
    runs-on: ubuntu-latest

    steps:
      - name: Notify Slack
        run: |
          if [ "${{ needs.browser-scrapers.result }}" = "failure" ] || [ "${{ needs.api-scrapers.result }}" = "failure" ]; then
            STATUS_EMOJI="Warning"
            STATUS_TEXT="Some scrapers failed"
          else
            STATUS_EMOJI="Complete"
            STATUS_TEXT="All scrapers completed"
          fi

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"Meeting Scraper: ${STATUS_TEXT}. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View details>\"}"
